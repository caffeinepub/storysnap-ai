<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StorySnap AI</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #050508;
        color: white;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #050508;
        z-index: 9999;
        gap: 20px;
        transition: opacity 0.3s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      .splash-logo {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        box-shadow: 0 0 40px rgba(168,85,247,0.4);
        animation: pulse 1.5s ease-in-out infinite;
      }
      .splash-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .splash-title span {
        background: linear-gradient(90deg, #818cf8, #c084fc, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .splash-dots {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .splash-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(168,85,247,0.5);
        animation: bounce 1.2s ease-in-out infinite;
      }
      .splash-dot:nth-child(2) { animation-delay: 0.2s; }
      .splash-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(168,85,247,0.4); }
        50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(168,85,247,0.6); }
      }
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
        40% { transform: translateY(-10px); opacity: 1; background: #a855f7; }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-EstTWomD.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BM6Qel99.css">
  </head>
  <body>
    <div id="splash">
      <div class="splash-logo">⚡</div>
      <div class="splash-title">StorySnap <span>AI</span></div>
      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Hide splash once React is ready
      window.__hideSplash = function() {
        var s = document.getElementById('splash');
        if (s) {
          s.classList.add('hide');
          setTimeout(function() { s.remove(); }, 350);
        }
      };
    </script>
  </body>
</html>
